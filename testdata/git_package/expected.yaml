apiVersion: apps/v1
kind: Deployment
metadata:
    labels:
        app: frontend
    name: frontend
    namespace: default
spec:
    replicas: 2
    selector:
        matchLabels:
            app: frontend
    template:
        metadata:
            labels:
                app: frontend
        spec:
            containers:
                - image: nginx:1.25
                  name: frontend
                  ports:
                    - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
    name: frontend-svc
    namespace: default
spec:
    ports:
        - port: 80
          targetPort: 80
    selector:
        app: frontend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: frontend-ing
    namespace: default
spec:
    rules:
        - host: app.example.com
          http:
            paths:
                - backend:
                    service:
                        name: frontend-svc
                        port:
                            number: 80
                  path: /
                  pathType: Prefix
---
apiVersion: v1
data:
    API_URL: https://api.example.com
kind: ConfigMap
metadata:
    name: frontend-config
    namespace: default
