apiVersion: apps/v1
kind: Deployment
metadata:
    labels:
        app: web-app
    name: web-app
    namespace: default
spec:
    replicas: 3
    selector:
        matchLabels:
            app: web-app
    template:
        metadata:
            labels:
                app: web-app
        spec:
            containers:
                - image: webapp:3.0
                  name: web-app
                  ports:
                    - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
    name: web-app-svc
    namespace: default
spec:
    ports:
        - port: 80
          targetPort: 8080
    selector:
        app: web-app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: web-app-ingress
    namespace: default
spec:
    rules:
        - host: app.example.com
          http:
            paths:
                - backend:
                    service:
                        name: web-app-svc
                        port:
                            number: 80
                  path: /
                  pathType: Prefix
