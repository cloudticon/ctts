apiVersion: apps/v1
kind: Deployment
metadata:
    labels:
        app: api
    name: api
    namespace: production
spec:
    replicas: 3
    selector:
        matchLabels:
            app: api
    template:
        metadata:
            labels:
                app: api
        spec:
            containers:
                - image: api:2.0
                  name: api
                  ports:
                    - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
    name: api-svc
    namespace: production
spec:
    ports:
        - port: 80
          targetPort: 3000
    selector:
        app: api
---
apiVersion: v1
data:
    ENV: production
    LOG_LEVEL: info
kind: ConfigMap
metadata:
    name: api-config
    namespace: production
