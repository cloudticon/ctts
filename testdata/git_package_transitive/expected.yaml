apiVersion: apps/v1
kind: Deployment
metadata:
    labels:
        app: myapp
    name: myapp
    namespace: production
spec:
    replicas: 2
    selector:
        matchLabels:
            app: myapp
    template:
        metadata:
            labels:
                app: myapp
        spec:
            containers:
                - image: myapp:latest
                  name: myapp
                  ports:
                    - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
    name: myapp-svc
    namespace: production
spec:
    ports:
        - port: 80
          targetPort: 80
    selector:
        app: myapp
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: myapp-ing
    namespace: production
spec:
    rules:
        - host: myapp.example.com
          http:
            paths:
                - backend:
                    service:
                        name: myapp-svc
                        port:
                            number: 80
                  path: /
                  pathType: Prefix
---
apiVersion: v1
data:
    APP_NAME: myapp
kind: ConfigMap
metadata:
    name: myapp-env
    namespace: production
