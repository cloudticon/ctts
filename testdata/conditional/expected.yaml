apiVersion: apps/v1
kind: Deployment
metadata:
    labels:
        app: api
    name: api
    namespace: production
spec:
    replicas: 2
    selector:
        matchLabels:
            app: api
    template:
        metadata:
            labels:
                app: api
        spec:
            containers:
                - image: api:1.0
                  name: api
                  ports:
                    - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
    name: api-svc
    namespace: production
spec:
    ports:
        - port: 80
          targetPort: 3000
    selector:
        app: api
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: api-ingress
    namespace: production
spec:
    rules:
        - host: api.example.com
          http:
            paths:
                - backend:
                    service:
                        name: api-svc
                        port:
                            number: 80
                  path: /
                  pathType: Prefix
